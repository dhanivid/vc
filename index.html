<!DOCTYPE html>
<html>
<head>
  <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <style>img[alt="www.000webhost.com"]{display: none;</style>
  <style>
    body, h1, video, button {
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      outline: none;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      background-color: #f2f2f2;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .video-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    video {
      width: 480px;
      height: 360px;
      object-fit: cover;
      background-color: #ccc;
    }

    #screenVideo {
      display: none;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background-color: #eee;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    #shareScreenButton {
      background-color: #ff8800;
    }

    .text-chat-container {
      box-shadow: rgba(156, 172, 172, 0.2) 0px 2px 2px, rgba(156, 172, 172, 0.2) 0px 4px 4px, rgba(156, 172, 172, 0.2) 0px 8px 8px, rgba(156, 172, 172, 0.2) 0px 16px 16px, rgba(156, 172, 172, 0.2) 0px 32px 32px, rgba(156, 172, 172, 0.2) 0px 64px 64px;
      border-radius: 3px;
      height: 600px;
      width: 405px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
    }

    iframe {
      flex-grow: 1;
      border: none;
    }

    .video-text-container {
      display: flex;
    }

    .video-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-right: 40px;
    }
  </style>
</head>

<body>
  <h1>Send your URL to a friend to start a video call</h1>

  <div class="video-text-container">
    <div class="video-column">
      <div class="video-container">
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
      </div>

      <div class="ss-container">
        <video id="screenVideo" autoplay></video>
      </div>

      <div class="controls">
        <button class="btn" id="toggleCameraBtn">Camera On</button>
        <button class="btn" id="toggleMicBtn">Mic On</button>
        <button class="btn" id="leaveBtn">Leave</button>
        <button class="btn" id="shareScreenButton">Share Screen</button>
      </div>
    </div>
  </div>

<script>
// Generate room
if (!location.hash) {
  location.hash = Math.floor(Math.random() * 0xFFFFFF).toString(16);
}
const roomHash = location.hash.substring(1);

const drone = new ScaleDrone('rCjTly38VieH3Dmk');
const roomName = 'observable-' + roomHash;

const configuration = {
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
};

let room;
let pc;

drone.on('open', error => {
  if (error) return console.error(error);

  room = drone.subscribe(roomName);

  room.on('members', members => {
    const isOfferer = members.length === 2;
    startWebRTC(isOfferer);
  });
});

function sendMessage(message) {
  drone.publish({ room: roomName, message });
}

function startWebRTC(isOfferer) {
  pc = new RTCPeerConnection(configuration);

  pc.onicecandidate = event => {
    if (event.candidate) sendMessage({ candidate: event.candidate });
  };

  if (isOfferer) {
    pc.onnegotiationneeded = () => {
      pc.createOffer().then(localDescCreated);
    };
  }

  pc.onaddstream = event => {
    remoteVideo.srcObject = event.stream;
  };

  navigator.mediaDevices.getUserMedia({ audio: true, video: true })
    .then(stream => {
      localVideo.srcObject = stream;
      pc.addStream(stream);
    });

  room.on('data', (message, client) => {
    if (client.id === drone.clientId) return;

    if (message.sdp) {
      pc.setRemoteDescription(new RTCSessionDescription(message.sdp), () => {
        if (pc.remoteDescription.type === 'offer') {
          pc.createAnswer().then(localDescCreated);
        }
      });
    } else if (message.candidate) {
      pc.addIceCandidate(new RTCIceCandidate(message.candidate));
    }
  });
}

function localDescCreated(desc) {
  pc.setLocalDescription(desc, () => {
    sendMessage({ sdp: pc.localDescription });
  });
}
</script>

</body>
</html>
